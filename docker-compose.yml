version: '3.7'
services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quantbrain-agent
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    env_file:
      - .env
    network_mode: host
    deploy:
      resources:
        limits:
          memory: 2G
